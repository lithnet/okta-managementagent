# Build and GitHub-release pipeline for the Lithnet Okta Management Agent (v3).
#
# v3 is an out-of-process MA: a net48 shim (loaded by miiserver) launches a self-contained,
# ReadyToRun net10 worker over a named pipe. The installer is built with Advanced Installer
# (Lithnet.Okta.ManagementAgent.Setup.aip) via the shared "release-tools" templates - the same
# pattern as miis-autosync. Code signing uses the Lithnet code-signing Key Vault via the
# ProductionServices service connection / managed identity (no secrets in this file):
#   * codesign.yaml signs the Lithnet binaries we build (the MA, the framework assemblies, the
#     shim, and the worker host exe) before packaging, so the MSI embeds signed payloads.
#   * build-advanced-installer-package.yaml (sign: true) signs the MSI itself during the build.
#
# This product publishes ONLY to GitHub releases (release-tools has no GitHub-publish template),
# so the signed MSI is published with the native GitHubRelease@1 task.
#
# PREREQUISITES for a green CI run (dev-only assumptions that must be resolved for CI):
#   * The Lithnet.Ecma2Framework package must resolve from a CI-accessible feed at a fixed
#     version - the dev setup floats 3.0.0-dev.* from a side-by-side local feed (src/nuget.config
#     Ecma2FrameworkLocal), which does not exist on the build agent. Pin a published 3.0.x and
#     point the package source at LithnetPrivatePackages.
#   * Microsoft.MetadirectoryServicesEx.dll must be available to the publish (the consumer's
#     <Reference> HintPath is a side-by-side path to the ecma2-framework repo on a dev box).

name: $(build.version.major).$(build.version.minor).$(build.version.revision)$(build.version.suffix)

trigger: none

pool:
  vmImage: 'windows-latest'

resources:
  repositories:
  - repository: release_tools
    type: git
    name: release-tools/release-tools
    ref: master

variables:
  - name: buildConfiguration
    value: Release
  - name: build.version.major
    value: 3
  - name: build.version.minor
    value: 0
  - name: build.version.revision
    value: $[counter(format('{0}.{1}', variables['build.version.major'], variables['build.version.minor']), 0)]
  - name: build.version.suffix
    value:
  - name: build.version
    value: $(build.version.major).$(build.version.minor).$(build.version.revision)$(build.version.suffix)
  - name: product.description
    value: Lithnet Okta Management Agent for Microsoft Identity Manager
  # Azure service connection with read access to the Lithnet code-signing Key Vault.
  - name: codeSigningSubscription
    value: ProductionServices
  # release-tools signing "environment" (dev|preview|prod) - selects the signing vault config.
  - name: signEnvironment
    value: prod
  # The folder the .aip harvests its payload from (the FolderProfile publish output). The publish
  # is directed here so it matches the .aip SourcePath (..\Lithnet.Okta.ManagementAgent\bin\Publish):
  # the self-contained R2R net10 worker (flat) plus the net48 shim + Packaged-MA manifest in ecma2\.
  - name: workerPublishPath
    value: '$(Build.SourcesDirectory)/src/Lithnet.Okta.ManagementAgent/bin/Publish'

stages:
- stage: build
  displayName: Build, sign and package
  jobs:
  - job: build_job
    displayName: Build, sign, package
    steps:
    - template: templates/checkout.yaml@release_tools

    - task: UseDotNet@2
      displayName: Install .NET 10 SDK
      inputs:
        packageType: sdk
        version: '10.0.x'

    - task: NuGetAuthenticate@1

    # Publish the consumer library with the FolderProfile. This drives the framework's host/shim
    # build: it produces the self-contained, ReadyToRun net10 worker (Ecma2Host.exe + closure)
    # flat in bin\Publish, plus bin\Publish\ecma2\ (the net48 shim + the Packaged-MA manifest) -
    # the exact folder the .aip harvests. Self-contained + R2R come from the consumer csproj's
    # Ecma2WorkerSelfContained / Ecma2WorkerReadyToRun.
    - task: DotNetCoreCLI@2
      displayName: Publish worker, shim and manifest
      inputs:
        command: custom
        custom: publish
        arguments: 'src/Lithnet.Okta.ManagementAgent/Lithnet.Okta.ManagementAgent.csproj -c $(buildConfiguration) -p:PublishProfile=FolderProfile -p:Version=$(build.version)'

    - task: PublishSymbols@2
      displayName: Publish symbols
      inputs:
        SearchPattern: '$(workerPublishPath)/**/*.pdb'
        IndexSources: false
        SymbolServerType: 'TeamServices'

    # Sign the Lithnet-authored binaries before packaging: the MA + framework assemblies and the
    # worker host exe (flat in bin\Publish), and the shim (in ecma2\). The .NET runtime and
    # third-party assemblies in the worker closure are already signed by their publishers.
    - template: templates/codesign.yaml@release_tools
      parameters:
        path:
        - '$(workerPublishPath)/Lithnet*.dll'
        - '$(workerPublishPath)/Ecma2Host.exe'
        - '$(workerPublishPath)/Ecma2Host.dll'
        - '$(workerPublishPath)/ecma2/Lithnet*.dll'
        environment: $(signEnvironment)
        azureSubscription: $(codeSigningSubscription)
        description: $(product.description)

    # Build + sign the MSI from the .aip. sign: true => Advanced Installer signs the MSI during
    # the build.
    - template: templates/build-advanced-installer-package.yaml@release_tools
      parameters:
        aipPath: '$(Build.SourcesDirectory)/src/Lithnet.Okta.ManagementAgent.Setup/Lithnet.Okta.ManagementAgent.Setup.aip'
        aipPackageName: 'Lithnet.Okta.ManagementAgent.msi'
        azureSubscription: $(codeSigningSubscription)
        environment: $(signEnvironment)
        outputFolder: '$(Build.ArtifactStagingDirectory)'
        sign: true

    - task: PublishPipelineArtifact@1
      displayName: Publish installer artifact
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: installer

- stage: publish_github
  displayName: Publish to GitHub
  dependsOn: build
  jobs:
  - deployment: publish_github_job
    displayName: Publish signed MSI to GitHub releases
    environment: GitHub
    pool:
      vmImage: windows-2022
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: none
          - download: current
            artifact: installer
          - task: GitHubRelease@1
            inputs:
              gitHubConnection: github.com_lithnet
              repositoryName: '$(Build.Repository.Name)'
              action: create
              tagSource: userSpecifiedTag
              tag: v$(build.version)
              title: v$(build.version)
              assets: '$(Pipeline.Workspace)/installer/*.msi'
              isPreRelease: true
              addChangeLog: true
              changeLogCompareToRelease: lastFullRelease
              changeLogType: commitBased
